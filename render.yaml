services:
  - type: web
    runtime: php
    name: linkedu-backend
    rootDir: backend
    plan: free
    region: frankfurt
    buildCommand: composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader
    preDeployCommand: |
      php artisan migrate --force
      php artisan storage:link || true
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    healthCheckPath: /up
    autoDeployTrigger: commit
    envVars:
      - key: APP_NAME
        value: LinkEdu
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://linkedu-backend.onrender.com
      - key: FRONTEND_URL
        value: https://linkedu-frontend.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: linkedu-db
          property: connectionString
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: SANCTUM_STATEFUL_DOMAINS
        value: linkedu-frontend.onrender.com
      - key: MAIL_MAILER
        value: log

  - type: web
    runtime: static
    name: linkedu-frontend
    rootDir: frontend
    plan: free
    buildCommand: npm ci; npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://linkedu-backend.onrender.com

databases:
  - name: linkedu-db
    plan: free
    region: frankfurt
